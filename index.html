<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Login</title>
<style>
body {
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#1e3a8a,#2563eb);
    font-family:Arial;
}

.box {
    background:#fff;
    padding:40px;
    border-radius:15px;
    width:300px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

h2 { margin-bottom:20px; }

input {
    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:25px;
    border:none;
    background:#f1f1f1;
}

button {
    width:100%;
    padding:12px;
    border:none;
    border-radius:25px;
    background:linear-gradient(to right,#f59e0b,#ef4444);
    color:white;
    font-weight:bold;
    cursor:pointer;
}

button:hover {
    opacity:0.9;
}

.small {
    margin-top:10px;
    font-size:12px;
    color:gray;
}
</style>
</head>

<body>

<div class="box">
    <h2>Login</h2>
    <form action="LoginServlet" method="post">
        <input type="text" name="user" placeholder="Username" required>
        <input type="password" name="pass" placeholder="Password" required>
        <button type="submit">LOG IN</button>
    </form>
    <div class="small">Cloud Security System</div>
</div>

</body>
</html>
